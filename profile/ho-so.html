<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - DakLak IOC</title>
    <meta name="description" content="Trung tâm Giám sát, Điều hành đô thị thông minh tỉnh Đăk Lăk - DakLakIOC">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap"
        rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../shared/giao-dien.css?v=7">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../profile/ho-so.css">
    <link rel="stylesheet" href="../auth/xac-thuc.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    

    <main class="profile-container container">
        <div class="breadcrumb">
            <a href="homepage.html">Trang chủ</a> / <span>Hồ sơ cá nhân</span>
        </div>

        <div class="profile-layout" id="profileContent" style="display: none;">
            <div class="profile-sidebar">
                <div class="avatar-container">
                    <img id="avatarPreview" src="https://ui-avatars.com/api/?name=User&background=random&size=150" alt="Avatar">
                    <label for="avatarUpload" class="avatar-upload-btn">
                        <i class="fa-solid fa-camera"></i> Đổi ảnh
                    </label>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                </div>
                <h3 id="sidebarUsername" class="sidebar-username">Username</h3>
                <p class="sidebar-role">Thành viên</p>
                <button type="button" id="removeAvatarBtn" class="btn btn-outline-danger" style="margin-top: 15px; width: 100%; border: 1px solid #ef4444; color: #ef4444; background: transparent; padding: 8px; border-radius: 6px; cursor: pointer;">
                    Xóa ảnh đại diện
                </button>
            </div>

            <div class="profile-main">
                <h2 class="section-title">Thông tin chung</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="username">Tên tài khoản (Không thể đổi)</label>
                        <input type="text" id="username" class="form-control" readonly style="background: #f1f5f9; cursor: not-allowed;">
                    </div>
                    
                    <div class="form-group">
                        <label for="fullName">Họ và tên</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên...">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Địa chỉ Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Nhập địa chỉ email...">
                    </div>
                    
                    <div class="form-group">
                        <label for="dob">Ngày tháng năm sinh</label>
                        <input type="date" id="dob" class="form-control">
                    </div>

                    <h2 class="section-title" style="margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 20px;">Bảo mật</h2>
                    <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Để trống nếu bạn không muốn thay đổi mật khẩu.</p>
                    
                    <div class="form-group">
                        <label for="newPassword">Mật khẩu mới</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="Nhập mật khẩu mới...">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu mới...">
                    </div>

                    <div class="form-actions" style="margin-top: 30px; display: flex; justify-content: flex-end;">
                        <button type="submit" class="btn btn-primary" id="saveProfileBtn">
                            <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="loginPrompt" style="text-align: center; padding: 100px 20px; display: none;">
            <i class="fa-solid fa-lock" style="font-size: 48px; color: #cbd5e1; margin-bottom: 20px;"></i>
            <h2>Bạn cần đăng nhập</h2>
            <p style="color: #64748b; margin-top: 10px; margin-bottom: 30px;">Vui lòng đăng nhập hoặc đăng ký để xem và chỉnh sửa hồ sơ cá nhân.</p>
            <button class="btn btn-primary" onclick="document.getElementById('userBtn').click()">Đăng nhập ngay</button>
        </div>
    </main>

    

    

    <script>window.BASE_URL = "../";</script>
    <script src="../shared/components.js?v=13"></script>
    <script src="../auth/xac-thuc.js"></script>
    <script src="../profile/ho-so.js"></script>
</body>

</html>
