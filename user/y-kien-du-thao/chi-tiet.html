<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Dự thảo - DakLakIOC</title>
    <meta name="description" content="Trung tâm Giám sát, Điều hành đô thị thông minh tỉnh Đăk Lăk - DakLakIOC">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../shared/giao-dien.css">
    <style>
        .detail-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 24px;
            margin-bottom: 24px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 16px;
            border-bottom: 1px dashed #eaeaea;
            padding-bottom: 16px;
        }
        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .detail-label {
            width: 150px;
            font-weight: 600;
            color: #555;
            flex-shrink: 0;
        }
        .detail-value {
            color: #333;
            flex-grow: 1;
        }
        .feedback-form-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #e2e8f0;
        }
        .feedback-form-container h3 {
            margin-top: 0;
            color: #0a59ab;
            margin-bottom: 20px;
            border-bottom: 2px solid #0a59ab;
            padding-bottom: 10px;
            display: inline-block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccd0d5;
            border-radius: 4px;
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: #0a59ab;
            box-shadow: 0 0 0 2px rgba(10,89,171,0.2);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        .btn-submit {
            background: #0a59ab;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-submit:hover {
            background: #084789;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <div id="header-container"></div>
    <div id="nav-container"></div>

    <div class="breadcrumb">
        <div class="container">
            <a href="../../index.html"><i class="fas fa-home"></i> Trang chủ</a>
            <i class="fas fa-chevron-right separator"></i>
            <a href="danh-sach.html">Ý kiến dự thảo</a>
            <i class="fas fa-chevron-right separator"></i>
            <span>Chi tiết & Góp ý</span>
        </div>
    </div>

    <main class="main-content">
        <div class="container" id="main-container">
            <div id="loading" style="text-align: center; padding: 40px;">Đang tải dữ liệu...</div>
            
            <div id="detail-content" style="display: none;">
                <div class="detail-card">
                    <h2 id="draft-title" style="color: #c00; margin-top: 0; margin-bottom: 20px;"></h2>
                    
                    <div class="detail-row">
                        <div class="detail-label">Số, ký hiệu:</div>
                        <div class="detail-value" id="draft-number"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Ngày tạo:</div>
                        <div class="detail-value" id="draft-date"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Thời hạn:</div>
                        <div class="detail-value" id="draft-end-date"></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">File đính kèm:</div>
                        <div class="detail-value" id="draft-file"></div>
                    </div>
                </div>

                <div class="feedback-form-container">
                    <h3><i class="fas fa-comment-dots"></i> Gửi góp ý</h3>
                    
                    <div id="feedback-alert" class="alert"></div>

                    <form id="feedback-form">
                        <div class="form-group">
                            <label for="fullName">Họ và tên <span style="color:red">*</span></label>
                            <input type="text" id="fullName" class="form-control" required placeholder="Nhập họ và tên của bạn">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Nhập email của bạn (không bắt buộc)">
                        </div>
                        <div class="form-group">
                            <label for="phoneNumber">Số điện thoại</label>
                            <input type="text" id="phoneNumber" class="form-control" placeholder="Nhập số điện thoại (không bắt buộc)">
                        </div>
                        <div class="form-group">
                            <label for="content">Nội dung góp ý <span style="color:red">*</span></label>
                            <textarea id="content" class="form-control" required placeholder="Nhập nội dung góp ý..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit" id="btn-submit">
                            <i class="fas fa-paper-plane"></i> Gửi góp ý
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>window.BASE_URL = "../../";</script>
    <script src="../../shared/components.js"></script>
    <script src="chi-tiet.js"></script>
    <script src="../../auth/xac-thuc.js"></script>
</body>

</html>
