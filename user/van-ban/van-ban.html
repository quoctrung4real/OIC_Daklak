<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Văn bản - DakLakIOC</title>
    <meta name="description" content="Trung tâm Giám sát, Điều hành đô thị thông minh tỉnh Đăk Lăk - DakLakIOC">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../shared/giao-dien.css?v=7">
    <style>
        .doc-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            background: #fff;
        }
        .doc-table th, .doc-table td {
            border: 1px solid #eaeaea;
            padding: 12px 15px;
            text-align: left;
        }
        .doc-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #333;
            text-align: center;
        }
        .doc-table td {
            color: #444;
            font-size: 15px;
        }
        .doc-table .text-center {
            text-align: center;
        }
        .doc-table tr:hover {
            background-color: #fcfcfc;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0a59ab;
            font-weight: 600;
            text-decoration: none;
        }
        .download-btn:hover {
            text-decoration: underline;
        }
        .doc-detail-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
            padding: 20px;
            z-index: 10000;
        }
        .doc-detail-modal.active {
            display: flex;
        }
        .doc-detail-panel {
            width: min(760px, 100%);
            max-height: min(720px, 92vh);
            overflow: auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.22);
        }
        .doc-detail-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 20px 22px;
            border-bottom: 1px solid #e5e7eb;
        }
        .doc-detail-header h2 {
            margin: 0;
            color: #0a59ab;
            font-size: 20px;
            line-height: 1.4;
        }
        .doc-detail-close {
            border: none;
            background: #f1f5f9;
            color: #334155;
            width: 34px;
            height: 34px;
            border-radius: 6px;
            cursor: pointer;
            flex: 0 0 auto;
        }
        .doc-detail-body {
            padding: 20px 22px 24px;
        }
        .doc-detail-grid {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 12px 18px;
            margin-bottom: 20px;
        }
        .doc-detail-label {
            color: #64748b;
            font-weight: 600;
        }
        .doc-detail-value {
            color: #1f2937;
        }
        .tts-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #0a59ab;
            background: #0a59ab;
            color: #fff;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-sizing: border-box;
            height: 40px;
        }
        .tts-btn:disabled {
            cursor: wait;
            opacity: 0.7;
        }
        #docDetailAudio {
            display: none;
            width: 100%;
            margin-top: 16px;
        }
        .page-header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #0a59ab;
        }
        .page-title {
            font-size: 24px;
            color: #0a59ab;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0;
        }
    </style>
</head>

<body>
    
    <!-- HEADER INJECTED BY COMPONENTS.JS -->

        <!-- ===== BREADCRUMB ===== -->
    <div style="border-bottom: 1px solid #e2e8f0; background: #fff;">
        <div class="container" style="display: flex;">
            <div style="background: #f1f5f9; padding: 12px 30px 12px 20px; font-size: 14px; color: #475569; display: flex; align-items: center; gap: 10px; clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%); font-weight: 500;">
                <i class="fa-solid fa-house" style="color: #64748b;"></i>
                <span>Trang chủ</span>
                <i class="fa-solid fa-caret-right" style="font-size: 12px; color: #94a3b8;"></i>
                <span style="color: #475569;">Văn bản</span>
            </div>
        </div>
    </div>

    <section style="padding: 40px 0; background-color: #f4f6f9; min-height: 60vh;">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Văn bản - Tài liệu</h1>
            </div>

            <div style="background: white; border-radius: 8px; padding: 20px; overflow-x: auto;">
                <table class="doc-table">
                    <thead>
                        <tr>
                            <th width="5%">STT</th>
                            <th width="15%">Số kí hiệu</th>
                            <th width="15%">Ngày ban hành</th>
                            <th width="50%">Trích yếu</th>
                            <th width="15%">File đính kèm</th>
                        </tr>
                    </thead>
                    <tbody id="document-table-body">
                        <!-- Dynamic rows will be rendered here -->
                        <tr>
                            <td colspan="5" class="text-center" style="padding: 30px;">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <div class="doc-detail-modal" id="docDetailModal" aria-hidden="true">
        <div class="doc-detail-panel" role="dialog" aria-modal="true" aria-labelledby="docDetailTitle">
            <div class="doc-detail-header">
                <h2 id="docDetailTitle"></h2>
                <button class="doc-detail-close" type="button" id="docDetailClose" aria-label="Dong chi tiet">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="doc-detail-body">
                <div class="doc-detail-grid">
                    <div class="doc-detail-label">Số ký hiệu</div>
                    <div class="doc-detail-value" id="docDetailNumber"></div>
                    <div class="doc-detail-label">Ngày ban hành</div>
                    <div class="doc-detail-value" id="docDetailDate"></div>
                    <div class="doc-detail-label">Loại văn bản</div>
                    <div class="doc-detail-value" id="docDetailType"></div>
                    <div class="doc-detail-label">Cơ quan ban hành</div>
                    <div class="doc-detail-value" id="docDetailAuthority"></div>
                    <div class="doc-detail-label">File đính kèm</div>
                    <div class="doc-detail-value" id="docDetailFile"></div>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
                    <a id="docDetailLinkBtn" href="#" class="tts-btn" style="text-decoration: none;">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        <span>Xem chi tiết</span>
                    </a>
                    <button id="docTtsBtn" class="tts-btn" type="button">
                        <i class="fa-solid fa-volume-high"></i>
                        <span>Nghe nội dung</span>
                    </button>
                    <span id="docTtsStatus" style="font-size: 13px; color: #64748b;"></span>
                </div>
                <audio id="docDetailAudio" controls></audio>
            </div>
        </div>
    </div>

    <!-- FOOTER INJECTED BY COMPONENTS.JS -->

    <script>window.BASE_URL = "../../";</script>
    <script src="../../shared/components.js?v=13"></script>
    <script src="../../user/trang-chu/trang-chu.js"></script>
    <script src="van-ban-v3.js"></script>
    <script src="../../auth/xac-thuc.js"></script>
</body>
</html>
